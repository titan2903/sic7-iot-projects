version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: gas_monitoring_influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password
      - DOCKER_INFLUXDB_INIT_ORG=gas_monitoring_org
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=218af1d808eb1d5f6ab847940d5f645ad11ddf05b1644762582c9dd186364bf7
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    restart: unless-stopped
    networks:
      - gas_monitoring

  # Optional: Grafana for advanced visualization
  grafana:
    image: grafana/grafana:latest
    container_name: gas_monitoring_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - gas_monitoring
    depends_on:
      - influxdb

volumes:
  influxdb_data:
  influxdb_config:
  grafana_data:

networks:
  gas_monitoring:
    driver: bridge

# To run: docker-compose up -d
# InfluxDB UI: http://localhost:8086 (admin/adminpassword)
# Grafana: http://localhost:3000 (admin/admin)
# Default InfluxDB Token: gas-monitoring-super-secret-token